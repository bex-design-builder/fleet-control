<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="terrain-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2428"/>
      <stop offset="35%" style="stop-color:#1a1f23"/>
      <stop offset="70%" style="stop-color:#15181b"/>
      <stop offset="100%" style="stop-color:#0f1214"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <pattern id="points" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.4" fill="rgba(255,255,255,0.06)"/>
      <circle cx="8" cy="5" r="0.35" fill="rgba(255,255,255,0.05)"/>
      <circle cx="5" cy="10" r="0.4" fill="rgba(255,255,255,0.05)"/>
    </pattern>
    <filter id="blur-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Base terrain -->
  <rect width="100%" height="100%" fill="url(#terrain-base)"/>
  <!-- Grid overlay -->
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <!-- Contour / elevation bands (LiDAR-style) -->
  <path d="M0,420 Q120,380 200,400 T400,360 T600,400 T800,350 L800,600 L0,600 Z" fill="rgba(40,48,52,0.5)" opacity="0.9"/>
  <path d="M0,380 Q100,340 250,370 T500,320 T800,380 L800,600 L0,600 Z" fill="rgba(35,42,46,0.5)" opacity="0.8"/>
  <path d="M0,320 Q180,280 350,310 T700,290 L800,600 L0,600 Z" fill="rgba(30,36,40,0.4)" opacity="0.7"/>
  <path d="M0,480 Q150,450 300,470 T600,440 T800,460 L800,600 L0,600 Z" fill="rgba(45,52,58,0.4)" opacity="0.6"/>
  <!-- Scattered points (point cloud feel) -->
  <rect width="100%" height="100%" fill="url(#points)" opacity="0.8"/>
  <!-- Construction-style zones (flattened areas) -->
  <ellipse cx="280" cy="380" rx="90" ry="50" fill="rgba(50,58,64,0.35)"/>
  <ellipse cx="520" cy="320" rx="70" ry="45" fill="rgba(48,56,62,0.3)"/>
  <ellipse cx="400" cy="480" rx="80" ry="40" fill="rgba(45,52,58,0.35)"/>
  <!-- Subtle scan lines -->
  <g stroke="rgba(255,255,255,0.02)" stroke-width="0.5" fill="none">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
  </g>
</svg>
